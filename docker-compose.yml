services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: notebrowse-app
    container_name: notebrowse-server
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://notebrowse_user:notebrowse_pass@db:5432/notebrowse?schema=public
      - NOTEBOOK_ENCRYPTION_KEY=oPSDvKy693l1lPBtC2KWaIPfwelLycK0nxh0W57WZeI=
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - notebrowse_net

  db-init:
    image: node:22-alpine
    container_name: notebrowse-db-init
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://notebrowse_user:notebrowse_pass@db:5432/notebrowse?schema=public
    volumes:
      - ./prisma:/prisma
    command: >
      sh -c "npx prisma db push --schema=/prisma/schema.prisma --accept-data-loss"
    networks:
      - notebrowse_net

  db:
    image: postgres:16-alpine
    container_name: notebrowse-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=notebrowse_user
      - POSTGRES_PASSWORD=notebrowse_pass
      - POSTGRES_DB=notebrowse
    ports:
      - "5432:5432"
    volumes:
      - notebrowse_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notebrowse_user -d notebrowse"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - notebrowse_net

volumes:
  notebrowse_data:

networks:
  notebrowse_net:
    driver: bridge
